    <path d="M0 -35 C-17 -35 -30 -22 -30 -5 C-30 8 -22 18 -15 25 L-15 40 C-15 44 -12 47 -8 47 L8 47 C12 47 15 44 15 40 L15 25 C22 18 30 8 30 -5 C30 -22 17 -35 0 -35 Z M-10 50 L10 50 C12 50 13 51 13 53 C13 55 12 56 10 56 L-10 56 C-12 56 -13 55 -13 53 C-13 51 -12 50 -10 50 Z" 
          fill="url(#iconGrad)"/>
  </g>
</svg>
